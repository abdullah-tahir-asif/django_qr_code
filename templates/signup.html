{% extends 'base.html' %}

{% block title %}Sign Up - QR Menu Generator{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5 col-xl-4">
            <div class="glass-card">
                <div class="text-center mb-4">
                    <div class="d-inline-flex align-items-center justify-content-center bg-light text-primary rounded-circle mb-3 border" style="width: 56px; height: 56px; font-size: 20px;">
                        <i class="fa-solid fa-user-plus"></i>
                    </div>
                    <h2 class="h3 mb-1">Create Account</h2>
                    <p class="text-muted small">Sign up to start generating menus</p>
                </div>

                <form action="{% url 'signup' %}" method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="fullname" class="form-label">Full Name</label>
                        <input type="text" id="fullname" class="form-control" placeholder="John Doe" required name="fullname">
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" id="email" class="form-control" placeholder="name@example.com" required name="email">
                    </div>
                    
                    <div class="mb-4">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" id="password" class="form-control" placeholder="Create a strong password" required name="password">
                    </div>

                    <button type="submit" class="btn btn-gradient w-100 py-2.5 mt-2">
                        <span>Sign Up</span>
                        <i class="fa-solid fa-user-plus ms-2"></i>
                    </button>
                </form>
                
                <div class="text-center mt-4">
                    <p class="text-muted small mb-0">Already have an account? <a href="{% url 'login' %}" class="text-primary text-decoration-none fw-semibold hover-underline" style="transition: color 0.2s;">Log In</a></p>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
.hover-underline:hover {
    color: var(--primary-hover) !important;
    text-decoration: underline !important;
}
</style>
{% endblock %}
