{% extends 'base.html' %}

{% block title %}Login - QR Menu Generator{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5 col-xl-4">
            <div class="glass-card">
                <div class="text-center mb-4">
                    <div class="d-inline-flex align-items-center justify-content-center bg-light text-primary rounded-circle mb-3 border" style="width: 56px; height: 56px; font-size: 20px;">
                        <i class="fa-solid fa-lock"></i>
                    </div>
                    <h2 class="h3 mb-1">Welcome Back</h2>
                    <p class="text-muted small">Enter your credentials to access your account</p>
                </div>

                {% if error %}
                    <div class="alert alert-danger border-0 bg-danger bg-opacity-10 text-danger rounded-3 py-2 px-3 mb-4 d-flex align-items-center gap-2" role="alert" style="font-size: 14px;">
                        <i class="fa-solid fa-triangle-exclamation"></i>
                        <span>{{ error }}</span>
                    </div>
                {% endif %}

                <form action="{% url 'login' %}" method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" id="email" class="form-control" placeholder="name@example.com" required name="email">
                    </div>
                    
                    <div class="mb-4">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" id="password" class="form-control" placeholder="Enter your password" required name="password">
                    </div>

                    <button type="submit" class="btn btn-gradient w-100 py-2.5 mt-2">
                        <span>Log In</span>
                        <i class="fa-solid fa-arrow-right-to-bracket ms-2"></i>
                    </button>
                </form>
                
                <div class="text-center mt-4">
                    <p class="text-muted small mb-0">Don't have an account? <a href="{% url 'signup' %}" class="text-primary text-decoration-none fw-semibold hover-underline" style="transition: color 0.2s;">Sign Up</a></p>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
.hover-underline:hover {
    color: var(--primary-hover) !important;
    text-decoration: underline !important;
}
</style>
{% endblock %}
